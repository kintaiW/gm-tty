<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>gm-tty</title>
    <link rel="stylesheet" href="/xterm.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #1e1e1e; overflow: hidden; }
        #terminal-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #terminal { width: 100%; height: 100%; padding: 4px; }
        #status-bar {
            position: fixed;
            top: 0;
            right: 0;
            padding: 4px 10px;
            font-family: monospace;
            font-size: 12px;
            border-bottom-left-radius: 4px;
            z-index: 100;
        }
        #status-bar.connected    { background: #1a472a; color: #a3e6b4; }
        #status-bar.connecting   { background: #3a3a00; color: #e0d080; }
        #status-bar.disconnected { background: #4a1a1a; color: #e08080; }
    </style>
</head>
<body>
    <div id="status-bar" class="connecting">● connecting...</div>
    <div id="terminal-container">
        <div id="terminal"></div>
    </div>
    <script src="/xterm.js"></script>
    <script src="/xterm-addon-fit.js"></script>
    <script src="/main.js"></script>
</body>
</html>
